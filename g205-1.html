<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portail Prévention PACA — Intégration Grist</title>
  <style>
    :root {
      --mask-height: 36px;   /* hauteur du bandeau blanc qui masque le haut de Grist */
      --bg: #ffffff;
      --frame-bg: #f5f7fb;
      --radius: 14px;
      --shadow: 0 10px 28px rgba(0,0,0,.10);
      --border: 1px solid rgba(27,57,106,.10);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: var(--bg);
      overflow: hidden;
    }

    .frame-shell {
      position: absolute;
      inset: 0;
      background: var(--frame-bg);
    }

    /* Le conteneur est décalé vers le haut pour “manger” la zone à masquer */
    .frame-wrap {
      position: absolute;
      top: calc(var(--mask-height) * -1);
      left: 0;
      width: 100%;
      height: calc(100% + var(--mask-height));
      overflow: hidden;
      background: var(--bg);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }

    /* Bandeau de masquage */
    .mask {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: var(--mask-height);
      background: var(--bg);
      z-index: 10;
      pointer-events: none;
    }

    /* Option “carte” si tu veux un rendu plus propre hors Google Sites */
    .card-mode .frame-shell {
      padding: 0;
      background: linear-gradient(180deg, #eef3fb 0%, #f7f9fd 100%);
    }

    .card-mode .frame-wrap {
      top: calc(var(--mask-height) * -1 + 12px);
      left: 12px;
      width: calc(100% - 24px);
      height: calc(100% + var(--mask-height) - 24px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: var(--border);
    }

    .card-mode .mask {
      top: 12px;
      left: 12px;
      width: calc(100% - 24px);
      border-top-left-radius: var(--radius);
      border-top-right-radius: var(--radius);
    }

    /* Mobile */
    @media (max-width: 768px) {
      :root { --mask-height: 40px; }
      .card-mode .frame-wrap {
        top: calc(var(--mask-height) * -1 + 8px);
        left: 8px;
        width: calc(100% - 16px);
        height: calc(100% + var(--mask-height) - 16px);
      }
      .card-mode .mask {
        top: 8px;
        left: 8px;
        width: calc(100% - 16px);
      }
    }

    /* Très petits écrans */
    @media (max-width: 480px) {
      :root { --mask-height: 36px; }
    }

    /* Masque le message si JS actif */
    .js .fallback { display: none; }
    .fallback {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      padding: 24px;
      text-align: center;
      color: #1b396a;
    }
    .fallback a { color: #1b396a; }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="frame-shell">
      <div class="frame-wrap">
        <iframe id="gristFrame" title="Portail Grist intégré" allow="fullscreen"></iframe>
      </div>
      <div class="mask" aria-hidden="true"></div>
    </div>

    <div class="fallback">
      <div>
        <p><strong>Chargement de l’intégration…</strong></p>
        <p>Si rien ne s’affiche, vérifie l’URL Grist dans le script.</p>
      </div>
    </div>
  </div>

  <script>
    document.documentElement.classList.add('js');

    /*
      ===============================
      PARAMÈTRES À ADAPTER
      ===============================
    */
    const CONFIG = {
      // Colle ici l’URL de ta page Grist publiée ou partageable
      gristUrl: 'https://docs.getgrist.com/aSw3QxcECnsx/Suivi-heures-travaillees/p/15',

      // true = rendu bord à bord, idéal pour Google Sites
      // false = rendu “carte” avec marges et ombre, utile hors Sites
      edgeToEdge: true,

      // Ajuste la zone masquée selon ce que tu veux cacher en haut
      maskHeight: 44,

      // Ajoute automatiquement embed=true si absent
      forceEmbed: true,

      // Enlève éventuellement d’autres paramètres parasites
      cleanParams: false
    };

    const app = document.getElementById('app');
    const frame = document.getElementById('gristFrame');
    document.documentElement.style.setProperty('--mask-height', CONFIG.maskHeight + 'px');

    if (!CONFIG.edgeToEdge) {
      app.classList.add('card-mode');
    }

    function buildUrl(rawUrl) {
      const url = new URL(rawUrl);

      if (CONFIG.cleanParams) {
        const keep = new Set(['embed', 'theme', 'style', 'page']);
        [...url.searchParams.keys()].forEach(k => {
          if (!keep.has(k)) url.searchParams.delete(k);
        });
      }

      if (CONFIG.forceEmbed && !url.searchParams.has('embed')) {
        url.searchParams.set('embed', 'true');
      }

      return url.toString();
    }

    frame.src = buildUrl(CONFIG.gristUrl);
  </script>
</body>
</html>
