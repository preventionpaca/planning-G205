<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agents du bureau G205 — consultation</title>
  <style>
    :root{--bg:#f4f7fb;--card:#fff;--text:#173357;--muted:#607492;--line:#d7e1ef;--accent:#1b396a;--accent2:#3f72af}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    .hero{padding:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
    .hero h1{margin:0 0 6px;font-size:26px}.sub{opacity:.94}
    .wrap{max-width:1100px;margin:0 auto;padding:18px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
    .btn{display:inline-flex;align-items:center;justify-content:center;border-radius:12px;padding:10px 14px;font-weight:700;text-decoration:none;border:1px solid var(--line);color:var(--text);background:#fff}
    .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
    .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 8px 24px rgba(23,51,87,.08)}
    .name{font-size:20px;font-weight:700;margin-bottom:6px}.muted{color:var(--muted);line-height:1.45}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  </style>
</head>
<body>
  <script>
    const AGENTS = [
      {name:'Raphaël Morise, Responsable du bureau des entreprises', page:'agent_portail_rm.html'},
      {name:'Rudy Thémines, Directeur délégué aux formations', page:'agent_portail_rt.html'},
      
    ];
  </script>
  <header class="hero">
    <h1>Liste des agents du bureau G205</h1>
    <div class="sub">Page de supervision : M.Stéphane Devin, Proviseur du Lycée Les Eucalyptus.</div>
  </header>
  <div class="wrap">
    <div class="toolbar">
    
    </div>
    <div class="grid" id="grid"></div>
  </div>
  <script>
    const grid = document.getElementById('grid');
    grid.innerHTML = AGENTS.map(a => `
      <section class="card">
        <div class="name">${a.name}</div>
        <div class="muted"> Consultation du planning : vue hebdomadaire avec bulles d'informations hebdobadaires et annuelles. Export ou impression de la synthèse et du planning.
        <div class="actions"><a class="btn primary" href="${a.page}">Ouvrir la page</a></div>
      </section>
    `).join('');
  </script>
</body>
</html>
